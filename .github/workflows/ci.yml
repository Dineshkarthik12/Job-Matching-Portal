name: CI/CD to AWS Fargate

on:
  push:
    branches: [main, master]

env:
  AWS_REGION: us-east-1 # Change to your region
  ECR_REPOSITORY_API: job-matching-api
  ECR_REPOSITORY_WEB: job-matching-web
  ECR_REPOSITORY_AI: job-matching-ai

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and Push API
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_API:$IMAGE_TAG ./backend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_API:latest ./backend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_API --all-tags

      - name: Build and Push Web
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_WEB:$IMAGE_TAG ./frontend
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_WEB:latest ./frontend
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_WEB --all-tags

      - name: Build and Push AI Service
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_AI:$IMAGE_TAG ./ai-service
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY_AI:latest ./ai-service
          docker push $ECR_REGISTRY/$ECR_REPOSITORY_AI --all-tags
